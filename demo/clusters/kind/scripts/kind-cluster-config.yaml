kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
featureGates:
  DynamicResourceAllocation: true
  DRAAdminAccess: true
  DRAResourceClaimDeviceStatus: true
  DRAPartitionableDevices: true
  DRAPrioritizedList: true
  DRAConsumableCapacity: true
containerdConfigPatches:
# Enable CDI as described in
# https://tags.cncf.io/container-device-interface#containerd-configuration
- |-
  [plugins."io.containerd.grpc.v1.cri"]
    enable_cdi = true
nodes:
- role: control-plane
  labels:
    node-role.x-k8s.io/control-plane: ""
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
        extraArgs:
          v: "1"
    scheduler:
        extraArgs:
          v: "1"
    controllerManager:
        extraArgs:
          v: "1"
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        v: "1"
- role: worker
  labels:
    node-role.x-k8s.io/worker: ""
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        v: "1"
  extraMounts:
  # We inject all AMD GPUs using the rocm-container-runtime.
  # This requires proper ROCm container runtime configuration
  # in the ROCm container toolkit setup
  - hostPath: /dev/null
    containerPath: /var/run/rocm-container-devices/cdi/dev.amd.com/gpu/all
  # We need to inject the ROCm device paths for GPU access
  # ROCm devices are exposed through standard device nodes
  - hostPath: /dev/kfd
    containerPath: /dev/kfd
  - hostPath: /dev/dri
    containerPath: /dev/dri
